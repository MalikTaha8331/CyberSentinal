<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSentinel — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0d0d1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated background */
        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation span {
            position: absolute;
            display: block;
            width: 20px; height: 20px;
            background: rgba(0, 229, 255, 0.05);
            animation: animate 25s linear infinite;
            bottom: -150px;
            border-radius: 4px;
        }

        .bg-animation span:nth-child(1)  { left: 25%; width: 80px;  height: 80px;  animation-delay: 0s;   animation-duration: 12s; }
        .bg-animation span:nth-child(2)  { left: 10%; width: 20px;  height: 20px;  animation-delay: 2s;   animation-duration: 18s; }
        .bg-animation span:nth-child(3)  { left: 70%; width: 20px;  height: 20px;  animation-delay: 4s;   animation-duration: 14s; }
        .bg-animation span:nth-child(4)  { left: 40%; width: 60px;  height: 60px;  animation-delay: 0s;   animation-duration: 20s; }
        .bg-animation span:nth-child(5)  { left: 65%; width: 20px;  height: 20px;  animation-delay: 0s;   animation-duration: 16s; }
        .bg-animation span:nth-child(6)  { left: 75%; width: 110px; height: 110px; animation-delay: 3s;   animation-duration: 22s; }
        .bg-animation span:nth-child(7)  { left: 35%; width: 150px; height: 150px; animation-delay: 7s;   animation-duration: 18s; }
        .bg-animation span:nth-child(8)  { left: 50%; width: 25px;  height: 25px;  animation-delay: 15s;  animation-duration: 20s; }
        .bg-animation span:nth-child(9)  { left: 20%; width: 15px;  height: 15px;  animation-delay: 2s;   animation-duration: 24s; }
        .bg-animation span:nth-child(10) { left: 85%; width: 150px; height: 150px; animation-delay: 0s;   animation-duration: 18s; }

        @keyframes animate {
            0%   { transform: translateY(0) rotate(0deg);   opacity: 1; border-radius: 4px; }
            100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; border-radius: 50%; }
        }

        /* Login card */
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 1px solid #0f3460;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 2rem;
            color: #00e5ff;
            margin-bottom: 6px;
        }

        .logo p {
            color: #90caf9;
            font-size: 0.85rem;
        }

        .logo .shield {
            font-size: 3rem;
            display: block;
            margin-bottom: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.1); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #90caf9;
            font-size: 0.85rem;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: #0d0d1a;
            border: 1px solid #0f3460;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 0.95rem;
            transition: border-color 0.3s;
            outline: none;
        }

        input:focus {
            border-color: #00e5ff;
            box-shadow: 0 0 0 3px rgba(0,229,255,0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #0f3460, #00e5ff);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,229,255,0.3);
        }

        .error-box {
            background: rgba(255,23,68,0.1);
            border: 1px solid #ff1744;
            border-radius: 8px;
            padding: 12px;
            color: #ff6b6b;
            font-size: 0.88rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .credentials-hint {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #1a1a3e;
            color: #555;
            font-size: 0.78rem;
        }

        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 24px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #00e676;
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.3; }
        }

        .status-text {
            color: #00e676;
            font-size: 0.78rem;
        }
    </style>
</head>
<body>

    <!-- Animated Background -->
    <div class="bg-animation">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
    </div>

    <!-- Login Card -->
    <div class="login-container">
        <div class="login-card">

            <div class="logo">
                <span class="shield">⚔️</span>
                <h1>CyberSentinel</h1>
                <p>AI-Powered Intrusion Prevention System</p>
            </div>

            <div class="status-bar">
                <div class="status-dot"></div>
                <span class="status-text">System Active — Monitoring Network</span>
            </div>

            {% if error %}
            <div class="error-box">
                🚨 {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="form-group">
                    <label>👤 Username</label>
                    <input type="text" name="username"
                           placeholder="Enter username"
                           required autofocus>
                </div>
                <div class="form-group">
                    <label>🔒 Password</label>
                    <input type="password" name="password"
                           placeholder="Enter password"
                           required>
                </div>
                <button type="submit" class="btn-login">
                    🔐 LOGIN TO CYBERSENTINEL
                </button>
            </form>

            <div class="credentials-hint">
                <a href="/forgot-password"
                   style="color:#9d4edd; text-decoration:none;
                          font-size:0.82rem;">
                    🔑 Forgot Password?
                </a>
            </div>
        </div>
    </div>

</body>
</html>
