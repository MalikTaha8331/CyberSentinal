<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSentinel — Forgot Password</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: #05050f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(157,78,221,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255,215,0,0.05) 0%, transparent 50%);
        }

        .container { width: 100%; max-width: 440px; padding: 20px; }

        .card {
            background: #0d0d1f;
            border: 1px solid #9d4edd;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(157,78,221,0.2);
        }

        .header {
            background: linear-gradient(135deg, #1a0a2e, #0d0d1f);
            padding: 28px;
            text-align: center;
            border-bottom: 1px solid #9d4edd;
        }

        .header h1 {
            font-family: 'Orbitron', monospace;
            font-size: 1.6rem;
            background: linear-gradient(90deg, #9d4edd, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
            margin-bottom: 6px;
        }

        .header p { color: #8888aa; font-size: 0.82rem; letter-spacing: 2px; }

        .body { padding: 30px; text-align: center; }

        .icon { font-size: 3rem; margin-bottom: 16px; display: block; }

        .body h2 {
            font-family: 'Orbitron', monospace;
            color: #ffd700;
            font-size: 0.95rem;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .body p {
            color: #8888aa;
            font-size: 0.88rem;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .form-group { margin-bottom: 18px; text-align: left; }

        label {
            display: block;
            color: #9d4edd;
            font-size: 0.78rem;
            margin-bottom: 6px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: #05050f;
            border: 1px solid #2d1b69;
            border-radius: 8px;
            color: #e0e0ff;
            font-size: 0.95rem;
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.3s;
            outline: none;
        }

        input:focus {
            border-color: #9d4edd;
            box-shadow: 0 0 10px rgba(157,78,221,0.3);
        }

        .btn-send {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg,
                rgba(157,78,221,0.3), rgba(255,215,0,0.2));
            border: 1px solid #9d4edd;
            border-radius: 8px;
            color: #ffd700;
            font-size: 0.9rem;
            font-weight: 700;
            font-family: 'Orbitron', monospace;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-send:hover {
            box-shadow: 0 0 20px rgba(157,78,221,0.5);
            transform: translateY(-2px);
        }

        .back-link {
            display: block;
            margin-top: 16px;
            color: #555577;
            font-size: 0.82rem;
            text-decoration: none;
        }

        .back-link a { color: #9d4edd; text-decoration: none; font-weight: 700; }
        .back-link a:hover { color: #ffd700; }

        .error-box {
            background: rgba(255,34,85,0.1);
            border: 1px solid #ff2255;
            border-radius: 8px;
            padding: 12px;
            color: #ff6b8a;
            font-size: 0.85rem;
            margin-bottom: 18px;
        }

        .success-box {
            background: rgba(0,255,136,0.1);
            border: 1px solid #00ff88;
            border-radius: 8px;
            padding: 12px;
            color: #00ff88;
            font-size: 0.85rem;
            margin-bottom: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>⚔️ CYBERSENTINEL</h1>
                <p>PASSWORD RECOVERY</p>
            </div>
            <div class="body">
                <span class="icon">🔑</span>
                <h2>FORGOT PASSWORD?</h2>
                <p>Enter your registered email address and
                   we'll send you a 6-digit OTP to reset
                   your password.</p>

                {% if error %}
                <div class="error-box">🚨 {{ error }}</div>
                {% endif %}

                {% if success %}
                <div class="success-box">✅ {{ success }}</div>
                {% endif %}

                <form method="POST" action="/forgot-password">
                    <div class="form-group">
                        <label>📧 Registered Email</label>
                        <input type="email" name="email"
                               placeholder="Enter your email address"
                               required autofocus>
                    </div>
                    <button type="submit" class="btn-send">
                        📨 Send OTP
                    </button>
                </form>

                <div class="back-link">
                    Remember your password?
                    <a href="/login">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
